# CoreDNS plugins included in the node-cache build.
#
# Format mirrors https://github.com/coredns/coredns/blob/master/plugin.cfg
#
#   name:dirname
#
#   name    — directive name used in Corefiles
#   dirname — plugin directory name under github.com/coredns/coredns/plugin/,
#             OR a full import path for external (non-coredns) plugins.
#
# Examples:
#   log:log                              (coredns internal plugin)
#   prometheus:metrics                   (name differs from directory)
#   myplugin:github.com/example/myplugin (external plugin)
#
# Ordering of internal plugins (those resolved under github.com/coredns/coredns/plugin/)
# is derived automatically from the vendored coredns zdirectives.go at generate time —
# the order listed here does not matter for them.
#
# For external plugins (full import paths), place them after the internal plugin
# they should execute after. The generator uses that relative position as the anchor.
# External plugins must be added to go.mod before running make generate:
#   go get <import-path> && go mod tidy && go mod vendor
#
# Run `make generate` after any change to regenerate zplugin.go and
# cmd/node-cache/app/zdirectives_gen.go.
timeouts:timeouts
reload:reload
bufsize:bufsize
bind:bind
debug:debug
trace:trace
health:health
pprof:pprof
prometheus:metrics
errors:errors
log:log
dns64:dns64
loadbalance:loadbalance
cache:cache
rewrite:rewrite
template:template
hosts:hosts
loop:loop
forward:forward
whoami:whoami
